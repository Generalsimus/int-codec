name: Auto Patch and Publish

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    permissions:
      contents: write
      id-token: write   # ← required by npm docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Clean old config (kills always-auth warning)
        run: rm -f .npmrc ~/.npmrc && npm config delete always-auth || true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (patch)
        run: |
          npm version patch -m "chore(release): %s [skip ci]"

      - name: Publish with Trusted Publishing
        run: npm publish --provenance --access public

      - name: Push version + tags
        run: git push --follow-tags